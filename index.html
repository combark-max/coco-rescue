<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>코코 구출 작전</title>
    <meta name="theme-color" content="#c81919" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="코코구출" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" aria-label="코코 구출 작전 게임 화면"></canvas>

      <section class="hud" aria-label="게임 상태">
        <div>
          <span class="label">거리</span>
          <strong id="distance">0m</strong>
        </div>
        <div>
          <span class="label">체력</span>
          <strong id="health">100</strong>
        </div>
        <div>
          <span class="label">무기</span>
          <strong id="weapon">일반 80</strong>
        </div>
        <div>
          <span class="label">점수</span>
          <strong id="score">0</strong>
        </div>
      </section>

      <button id="settingsToggle" class="settings-toggle hidden" type="button" aria-label="설정" title="설정">⚙</button>

      <section id="settingsPanel" class="settings-panel hidden" aria-label="설정">
        <div class="settings-box">
          <h2>설정</h2>
          <div class="settings-row">
            <span>캐릭터 선택</span>
            <strong id="pauseState">준비 중</strong>
          </div>
          <div id="characterSelect" class="character-select" aria-label="캐릭터 선택"></div>

          <div class="settings-row settings-row-spaced">
            <span>사운드</span>
            <button id="soundToggle" class="sound-toggle" type="button" aria-pressed="true">ON</button>
          </div>

          <button id="settingsClose" class="settings-close" type="button">계속하기</button>
        </div>
      </section>

      <button id="weaponToggle" class="weapon-toggle hidden" type="button" aria-label="무기 선택" title="무기 선택">R</button>
      <section id="weaponBar" class="weapon-bar weapon-picker hidden" aria-label="무기 선택"></section>

      <section class="controls" aria-label="모바일 조작">
        <div id="stick" class="stick">
          <div id="thumb" class="thumb"></div>
        </div>
        <button id="shoot" class="shoot" type="button" aria-label="발사">●</button>
      </section>

      <section id="overlay" class="overlay title-screen">
        <div class="title-copy">
          <h1><span>코코</span>를 구하라</h1>
          <p>- 준영, 준성에게 -</p>
        </div>
        <button id="start" class="start-box" type="button">시작</button>
        <p class="brand-mark">-明‘s Life-</p>
      </section>
    </main>

    <script src="./game.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js");
        });
      }
    </script>
  </body>
</html>
